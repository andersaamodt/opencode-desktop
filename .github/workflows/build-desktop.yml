name: Build Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wizardry platform
        uses: actions/checkout@v4
        with:
          repository: andersaamodt/wizardry-apps
          path: .wizardry-platform

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget file libfuse2 gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Build AppImage
        run: sh tools/release/build-appimage.sh dist .wizardry-platform

      - name: Smoke-check AppImage
        run: sh tools/release/smoke-appimage.sh dist/OpenCode-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: dist/OpenCode-x86_64.AppImage

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wizardry platform
        uses: actions/checkout@v4
        with:
          repository: andersaamodt/wizardry-apps
          path: .wizardry-platform

      - name: Build macOS bundle
        run: sh tools/release/build-macos-bundle.sh dist .wizardry-platform

      - name: Smoke-check macOS bundle
        run: sh tools/release/smoke-macos-bundle.sh dist/OpenCode.app

      - name: Zip macOS bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/OpenCode.app dist/OpenCode-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            dist/OpenCode.app
            dist/OpenCode-macos.zip
